specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Botpress
providerId: botpress
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- Conversational
- Chat
- Open Source
- Bot Builder
- LLM
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps view of Botpress Cloud. Billing combines a base plan fee per tier
  with separate AI Spend (LLM token cost) drawn down from a $5/month credit on
  Pay-as-you-go and pass-through on paid tiers. Vector storage and seats are tier-gated.
  Self-hosted Botpress costs only your infra plus LLM bills.
notes: AI Spend is the variable cost; rightsize agent flow design and chosen LLM model to control burn.
sources:
- https://botpress.com/pricing
- https://botpress.com/docs
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Botpress
serviceCategory: AI
billingModel:
  pricingCategory: Subscription + AI Spend Pass-Through
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Botpress Cloud
  ServiceCategory: AI
  ProviderName: Botpress
  PublisherName: Botpress
  InvoiceIssuerName: Botpress
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
- name: plan_fee
  description: Monthly plan subscription fee.
  unit: month
  aggregation: sum
  dimensions:
  - account
  - plan
- name: incoming_messages
  description: Incoming messages handled per month.
  unit: message
  aggregation: sum
  dimensions:
  - account
  - bot
- name: ai_spend
  description: LLM token spend (provider pass-through).
  unit: USD
  aggregation: sum
  dimensions:
  - account
  - model
- name: vector_storage
  description: Vector DB storage size.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
- name: seats
  description: Workspace collaborator seats.
  unit: seat-month
  aggregation: max
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track plan fee, incoming messages, AI Spend, and vector storage in Botpress workspace dashboard.
- name: Allocation
  description: Tag bots to consuming line of business / customer.
- name: Optimization
  description: Reduce AI Spend by selecting cheaper models for non-critical flows and pre-computing answers via vector DB.
- name: Accountability
  description: Assign owners for plan fee and AI Spend separately; PAYG tier offers $5 AI credit/month.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
